<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Passcode</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 40px auto;">
    <tr>
      <td style="background: linear-gradient(135deg, #004643 0%, #005d58 100%); padding: 40px 30px; border-radius: 16px 16px 0 0; text-align: center;">
        <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: 600;">
          Reset Passcode 🔐
        </h1>
      </td>
    </tr>
    <tr>
      <td style="background-color: #ffffff; padding: 40px 30px;">
        <p style="color: #374151; font-size: 16px; line-height: 1.6; margin: 0 0 30px;">
          Bạn đã yêu cầu đặt lại Passcode. Vui lòng sử dụng mã OTP bên dưới để xác nhận:
        </p>
        <div style="background-color: #f3f4f6; border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 30px;">
          <p style="color: #6b7280; font-size: 14px; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px;">
            Mã OTP của bạn
          </p>
          <p style="color: #004643; font-size: 36px; font-weight: 700; letter-spacing: 8px; margin: 0;">
            {{otp}}
          </p>
        </div>
        <p style="color: #9ca3af; font-size: 14px; line-height: 1.6; margin: 0 0 20px; text-align: center;">
          ⏱️ Mã OTP này sẽ hết hạn sau <strong>{{expiryMinutes}} phút</strong>
        </p>
        <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 30px 0;">
        <p style="color: #9ca3af; font-size: 13px; line-height: 1.6; margin: 0; text-align: center;">
          Nếu bạn không yêu cầu đặt lại Passcode, vui lòng bỏ qua email này.
        </p>
      </td>
    </tr>
    <tr>
      <td style="background-color: #f9fafb; padding: 24px 30px; border-radius: 0 0 16px 16px; text-align: center;">
        <p style="color: #9ca3af; font-size: 12px; margin: 0;">
          © 2025 SZONE. All rights reserved.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
